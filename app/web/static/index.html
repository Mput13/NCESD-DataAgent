<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DataAgent - Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="22" height="22">
          <line x1="8" y1="9" x2="16" y2="16" stroke="#0B0B0B" stroke-width="1.6"/>
          <line x1="24" y1="8" x2="16" y2="16" stroke="#2684FF" stroke-width="1.6"/>
          <line x1="6" y1="22" x2="16" y2="16" stroke="#0B0B0B" stroke-width="1.6"/>
          <line x1="22" y1="24" x2="16" y2="16" stroke="#2684FF" stroke-width="1.6"/>
          <circle cx="8" cy="9" r="2.6" fill="#0B0B0B"/>
          <circle cx="24" cy="8" r="2.6" fill="#2684FF"/>
          <circle cx="6" cy="22" r="2.6" fill="#0B0B0B"/>
          <circle cx="22" cy="24" r="2.6" fill="#2684FF"/>
          <circle cx="16" cy="16" r="3.4" fill="#B6FF00" stroke="#0B0B0B" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="brand-name">DataAgent</span>
      <span class="brand-tag">Workspace</span>
    </div>

    <div class="run-meta">
      <span class="run-id">new run</span>
      <span class="run-sep">·</span>
      <span class="run-stage">Pipeline ready</span>
    </div>

    <div class="header-actions">
      <button class="btn-ghost" title="Новый анализ" type="button">
        <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        New analysis
      </button>
      <button class="icon-btn" title="Уведомления" aria-label="Notifications" type="button">
        <svg viewBox="0 0 20 20" width="16" height="16"><path d="M5 8a5 5 0 1 1 10 0v3l1.5 2.5h-13L5 11V8Zm3 7a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dot"></span>
      </button>
      <button class="icon-btn" title="Помощь" aria-label="Help" type="button">
        <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="10" r="7.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M7.8 7.5a2.2 2.2 0 1 1 3.7 1.6c-.9.6-1.5 1-1.5 2M10 14h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
      </button>
      <div class="user-pill"><span class="avatar-sm">EK</span></div>
    </div>
  </header>

  <main class="workspace">
    <section class="chat-pane">
      <div class="chat-header">
        <div class="chat-title">
          <span class="dot-status"></span>
          <strong>Экономический DataAgent</strong>
          <span class="chat-meta">Qdrant · DuckDB · trusted sources · Phase 2</span>
        </div>
        <div class="chat-tools">
          <button class="chip-btn" type="button">Share</button>
          <button class="chip-btn" type="button">Export</button>
          <button class="chip-btn ghost" type="button">...</button>
        </div>
      </div>

      <div class="chat-scroll" id="chatScroll">
        <div class="thread" id="thread"></div>
      </div>

      <div class="composer">
        <div class="composer-inner">
          <button class="composer-icon" title="Прикрепить" type="button">
            <svg viewBox="0 0 20 20" width="16" height="16"><path d="M14 7l-5.5 5.5a2.5 2.5 0 0 1-3.5-3.5L10 4a4 4 0 0 1 5.5 5.5L9 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
          <textarea id="composerInput" rows="1" placeholder="Задайте экономический вопрос, например: Какой ВВП России в 2024 году?"></textarea>
          <div class="composer-meta"><span class="kbd">Ctrl</span><span class="kbd">Enter</span></div>
          <button class="composer-send" id="sendBtn" aria-label="Отправить" type="button">
            <svg viewBox="0 0 20 20" width="16" height="16"><path d="M3 10l14-6-6 14-2-6-6-2Z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="composer-suggest">
          <button class="sugg" type="button">Какой ВВП России в 2024 году?</button>
          <button class="sugg" type="button">Покажи ВВП России по ППС по Росстату.</button>
          <button class="sugg" type="button">Найди источник по инфляции России за 2023 год.</button>
          <button class="sugg" type="button">Сравни ВВП России и Казахстана.</button>
        </div>
      </div>
    </section>

    <aside class="trace-pane" id="artifactsPane">
      <div class="trace-head">
        <div>
          <div class="trace-title">
            <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true"><path d="M3 5l7-3 7 3v10l-7 3-7-3V5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 5l7 3 7-3M10 8v10" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
            Artifacts
          </div>
          <div class="trace-sub" id="artifactsSub">0 artifacts</div>
        </div>
        <button class="icon-btn" title="Свернуть" aria-label="Collapse" type="button">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none"><path d="M11 3l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="art-filters">
        <button class="art-filter active" data-filter="all" type="button">Все</button>
        <button class="art-filter" data-filter="chart" type="button">Графики</button>
        <button class="art-filter" data-filter="table" type="button">Таблицы</button>
        <button class="art-filter" data-filter="doc" type="button">Документы</button>
      </div>

      <div class="art-list" id="artList">
        <div class="art-empty">
          <div class="art-empty-ico">#</div>
          <div class="art-empty-title">Здесь появятся артефакты</div>
          <div class="art-empty-text">Таблицы, скрипты и документы из ответа будут собираться сюда.</div>
        </div>
      </div>

      <div class="trace-foot">
        <div class="foot-row"><span>Run</span><strong>live</strong></div>
        <div class="foot-row"><span>Storage</span><strong>0 KB</strong></div>
        <button class="trace-cancel" id="exportAll" type="button">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="none"><path d="M8 2v8m0 0l3-3m-3 3l-3-3M3 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Экспортировать все
        </button>
      </div>
    </aside>
  </main>

  <script src="/js/data.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>

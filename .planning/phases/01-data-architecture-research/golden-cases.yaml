- id: GC-001
  category: simple
  query_ru: "Какой ВВП России в 2024 году?"
  expected_route: "direct_lookup_with_methodology_choice"
  expected_sources:
    - "FedStat"
    - "World Bank"
  needs_clarification: true
  expected_artifacts:
    - "IntentArtifact with metric=GDP, geography=Russia, period=2024"
    - "SourceCandidateCard for FedStat GDP and World Bank GDP"
    - "Clarification question about Rosstat rubles vs World Bank current USD"
  expected_rejection_or_no_data:
    - "Do not extract a value until the source/methodology choice is resolved."
  trace_expectations:
    - "intent classification is simple"
    - "candidate sources show source, unit, period, geography, and provenance"
    - "trace records why clarification blocks extraction"

